<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Capacidade &middot; Time de Relacionamento</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#008ECF;--blue-soft:#E6F4FB;--blue-mid:#B3DDF2;
  --yellow:#F9DC45;--yellow-soft:#FFFBE6;
  --purple:#7668AC;--purple-soft:#F0EEF8;
  --ok:#1A9957;--ok-bg:#E6F5EE;
  --warn:#C47A00;--warn-bg:#FFF5D6;
  --bad:#C0392B;--bad-bg:#FDECEB;
  --bg:#F3F6F9;--card:#fff;--border:#E0E6ED;
  --t1:#1D1C1D;--t2:#595959;--t3:#9BA8B5;
  --r:10px;--sh:0 1px 4px rgba(0,0,0,.07)
}
body{font-family:Arial,sans-serif;background:var(--bg);color:var(--t1);font-size:14px;line-height:1.5;height:100vh;display:flex;flex-direction:column;overflow:hidden}
.header{background:var(--blue);color:#fff;padding:0 24px;display:flex;align-items:center;gap:14px;height:54px;flex-shrink:0;position:relative}
.header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:4px;background:var(--yellow)}
.header h1{font-size:16px;font-weight:700;flex:1;text-align:center}
.header .sub{font-size:11px;opacity:.75}
.btn-back{display:flex;align-items:center;gap:5px;color:#fff;text-decoration:none;font-size:12px;font-weight:600;opacity:.85;transition:opacity .15s;white-space:nowrap;flex-shrink:0}
.btn-back:hover{opacity:1}
.btn-back svg{flex-shrink:0}
.layout{display:grid;grid-template-columns:264px 1fr;flex:1;overflow:hidden}
.sidebar{background:var(--card);border-right:1px solid var(--border);padding:16px;overflow-y:auto}
.main{overflow-y:auto;padding:20px 24px}
.fl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--t3);margin-bottom:8px}
.fs{margin-bottom:18px}
.presets{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.preset-btn{padding:4px 10px;border-radius:999px;border:1.5px solid var(--border);background:var(--card);font-size:12px;font-weight:600;color:var(--t2);cursor:pointer;transition:all .15s}
.preset-btn:hover{border-color:var(--blue);color:var(--blue)}
.preset-btn.active{background:var(--blue);border-color:var(--blue);color:#fff}
.slider-big{font-size:26px;font-weight:700;color:var(--blue)}
.slider-unit{font-size:12px;color:var(--t2);margin-left:3px}
.slider-range{font-size:10px;color:var(--t3);margin:3px 0 7px}
input[type=range]{width:100%;accent-color:var(--blue);cursor:pointer;height:4px}
.slider-marks{display:flex;justify-content:space-between;font-size:10px;color:var(--t3);margin-top:2px}
.disclaimer{font-size:10px;color:var(--t3);margin-top:7px;line-height:1.4;padding:6px 8px;background:var(--yellow-soft);border-radius:6px;border-left:3px solid var(--yellow)}
.cargo-opts{display:flex;flex-direction:column;gap:8px}
.cargo-opt{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px}
.cargo-opt input{accent-color:var(--blue);cursor:pointer}
.csearch{width:100%;padding:6px 10px;border:1.5px solid var(--border);border-radius:7px;font-size:12px;margin-bottom:6px;outline:none;font-family:Arial,sans-serif}
.csearch:focus{border-color:var(--blue)}
.cactions{display:flex;gap:10px;margin-bottom:8px}
.btn-link{font-size:11px;color:var(--blue);cursor:pointer;background:none;border:none;padding:0;text-decoration:underline;font-family:Arial,sans-serif}
.clist{display:flex;flex-direction:column;gap:3px;max-height:280px;overflow-y:auto}
.citem{display:flex;align-items:center;gap:7px;padding:5px 7px;border-radius:6px;cursor:pointer;font-size:12px}
.citem:hover{background:var(--bg)}
.cemail{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:999px;flex-shrink:0}
.ba{background:var(--blue-soft);color:var(--blue)}
.be{background:var(--purple-soft);color:var(--purple)}
.sec{font-size:12px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px;margin-top:4px;color:var(--t2);text-transform:uppercase;letter-spacing:.05em}
.sec::after{content:'';flex:1;height:1px;background:var(--border);margin-left:4px}
.sec-icon{width:14px;height:14px;flex-shrink:0;color:var(--blue)}
.ov-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:8px;margin-bottom:20px}
.ov-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:11px 12px;box-shadow:var(--sh)}
.ov-card.hl{background:var(--blue);border-color:var(--blue)}
.ov-card.hl-y{background:var(--yellow);border-color:var(--yellow)}
.ov-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--t3);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ov-val{font-size:22px;font-weight:700;color:var(--t1);line-height:1;margin-bottom:2px}
.ov-sub{font-size:10px;color:var(--t2)}
.hl .ov-label,.hl .ov-val,.hl .ov-sub{color:#fff}
.hl .ov-label{opacity:.72}
.hl-y .ov-label,.hl-y .ov-sub{color:var(--t2)}
.hl-y .ov-val{color:var(--t1)}
.cargo-wrap{background:var(--card);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--sh);margin-bottom:20px;overflow:hidden}
.cargo-cmp-table{width:100%;border-collapse:collapse}
.cargo-cmp-table th{padding:12px 18px;font-size:12px;font-weight:700;text-align:center;border-bottom:2px solid var(--border)}
.cargo-cmp-table th:first-child{text-align:left;color:var(--t3);font-weight:600;text-transform:uppercase;letter-spacing:.05em;font-size:10px;width:36%}
.cargo-cmp-table th.th-a{background:var(--blue-soft);color:var(--blue);border-bottom-color:var(--blue)}
.cargo-cmp-table th.th-e{background:var(--purple-soft);color:var(--purple);border-bottom-color:var(--purple)}
.cargo-cmp-table td{padding:10px 18px;font-size:13px;text-align:center;border-top:1px solid var(--border)}
.cargo-cmp-table td:first-child{text-align:left;color:var(--t2);font-size:12px}
.cargo-cmp-table tr:first-child td{border-top:none}
.cargo-cmp-table .cv{font-size:17px;font-weight:700;color:var(--t1)}
.cargo-cmp-table tr:hover td{background:var(--bg)}
.cargo-cmp-table .act-row td{background:var(--bg)}
.cargo-cmp-table .act-row .cv{font-size:22px}
.top-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.top-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px;box-shadow:var(--sh);border-top:3px solid var(--blue)}
.top-card.tc-e{border-top-color:var(--purple)}
.top-cat{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--t3);margin-bottom:4px}
.top-name{font-size:14px;font-weight:700;color:var(--t1);margin-bottom:2px}
.top-val{font-size:20px;font-weight:700;color:var(--blue);margin-bottom:1px}
.top-card.tc-e .top-val{color:var(--purple)}
.top-unit{font-size:10px;color:var(--t2)}
.tbl-wrap{overflow-x:auto;border-radius:var(--r);box-shadow:var(--sh);margin-bottom:24px}
table{width:100%;border-collapse:collapse;background:var(--card)}
thead th{background:var(--bg);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--t2);padding:9px 12px;border-bottom:1px solid var(--border);text-align:right;cursor:pointer;user-select:none;white-space:nowrap}
thead th:first-child,thead th:nth-child(2){text-align:left}
thead th:hover{color:var(--blue)}
thead th.sorted{color:var(--blue)}
.sa{display:inline-block;margin-left:3px;opacity:.4;font-size:10px}
thead th.sorted .sa{opacity:1}
tbody tr{border-bottom:1px solid var(--border)}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--blue-soft)}
tbody td{padding:8px 12px;font-size:13px;text-align:right}
tbody td:first-child,tbody td:nth-child(2){text-align:left}
.pill{display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:700}
.pill-ok{background:var(--ok-bg);color:var(--ok)}
.pill-warn{background:var(--warn-bg);color:var(--warn)}
.pill-bad{background:var(--bad-bg);color:var(--bad)}
.no-data{text-align:center;padding:40px;color:var(--t3);font-size:13px}
</style>
</head>

const ANALISTAS = new Set(["alixibeth.cardiel", "carla.gomes", "daniela.rojas", "erick.andrade", "indlayse.ferreira", "larissa.freitas", "maria.elvira", "mariaeduarda.carvalho", "mariana.santana", "nerbis.carrero", "nioximar.villael", "renata.brandao", "rubia.toledo", "sarah.moura", "talita.panassol", "tatiana.portela", "thayna.bastos"]);
const MAX_DATE = "2026-05-28";

function getCargo(email){ return ANALISTAS.has(email.split('@')[0]) ? 'Analista' : 'Estagiário'; }
function firstName(email){
  const parts=email.split('@')[0].split('.');
  return parts.map(p=>p.charAt(0).toUpperCase()+p.slice(1)).join(' ');
}
function startDate(n){
  const d=new Date(MAX_DATE); d.setDate(d.getDate()-n+1); return d.toISOString().slice(0,10);
}
function fmtDate(iso){ const [y,m,day]=iso.split('-'); return `${day}/${m}`; }
function pct(v){ return (v*100).toFixed(1)+'%'; }
function r1(v){ return v.toFixed(1); }

let windowDays=28, selectedEmails=new Set(RAW_DATA.map(r=>r.email)), showA=true, showE=true;
let sortCol='ativDia', sortAsc=false;

function calcConsultant(row, nDays){
  const start=startDate(nDays);
  const wd=row.days.filter(d=>d.d>=start&&d.a>3);
  if(!wd.length) return null;
  const tA=wd.reduce((s,d)=>s+d.a,0), tE=wd.reduce((s,d)=>s+d.e,0);
  const tS=wd.reduce((s,d)=>s+d.s,0), tSE=wd.reduce((s,d)=>s+d.se,0);
  const n=wd.length;
  return {
    email:row.email, cargo:getCargo(row.email), dias:n,
    ativDia:tA/n, efDia:tE/n, escDia:tS/n, escEfDia:tSE/n,
    pctEf:tA>0?tE/tA:0, pctEscEf:tS>0?tSE/tS:0,
    tA,tE,tS,tSE
  };
}

function aggregate(ms){
  if(!ms.length) return null;
  const n=ms.length;
  const avg=fn=>ms.reduce((s,m)=>s+fn(m),0)/n;
  const tA=ms.reduce((s,m)=>s+m.tA,0), tE=ms.reduce((s,m)=>s+m.tE,0);
  const tS=ms.reduce((s,m)=>s+m.tS,0), tSE=ms.reduce((s,m)=>s+m.tSE,0);
  return {
    count:n, avgDias:avg(m=>m.dias),
    avgAtivDia:avg(m=>m.ativDia), avgEfDia:avg(m=>m.efDia),
    avgEscDia:avg(m=>m.escDia), avgEscEfDia:avg(m=>m.escEfDia),
    pctEf:tA>0?tE/tA:0, pctEscEf:tS>0?tSE/tS:0
  };
}

function render(){
  const start=startDate(windowDays);
  const rows=RAW_DATA.filter(r=>{
    if(!selectedEmails.has(r.email)) return false;
    const c=getCargo(r.email);
    if(c==='Analista'&&!showA) return false;
    if(c==='Estagiário'&&!showE) return false;
    return true;
  });

  const allMetrics=rows.map(r=>calcConsultant(r,windowDays));
  const active=allMetrics.filter(m=>m!==null);
  const total=aggregate(active);

  document.getElementById('hdr-range').textContent=`${fmtDate(start)} – ${fmtDate(MAX_DATE)} (${windowDays}d corridos)`;
  document.getElementById('slider-range').textContent=`${fmtDate(start)} → ${fmtDate(MAX_DATE)}`;

  const ov=document.getElementById('overview');
  if(!total){
    ov.innerHTML='<div class="no-data" style="grid-column:1/-1">Nenhum consultor ativo no período selecionado.</div>';
  } else {
    const card=(val,lbl,sub='',cls='')=>`<div class="ov-card ${cls}"><div class="ov-label">${lbl}</div><div class="ov-val">${val}</div>${sub?`<div class="ov-sub">${sub}</div>`:''}</div>`;
    ov.innerHTML=
      card(total.count,'Consultores ativos',`de ${rows.length} selecionados`,'hl-y')+
      card(r1(total.avgDias),'Dias trab. médio','por consultor')+
      card(r1(total.avgAtivDia),'Ativ/dia','média por consultor')+
      card(r1(total.avgEfDia),'Efetivas/dia','média por consultor','hl')+
      card(r1(total.avgEscDia),'Escolas/dia','média por consultor')+
      card(pct(total.pctEf),'% Efetividade','efetivas / atividades')+
      card(pct(total.pctEscEf),'% Esc. efetivas','esc.ef / esc. atingidas');
  }

  const agg_a=aggregate(active.filter(m=>m.cargo==='Analista'));
  const agg_e=aggregate(active.filter(m=>m.cargo==='Estagiário'));
  const ct=document.getElementById('cargo-table');
  const metricRows=[
    ['Consultores ativos','count',v=>String(v)],
    ['Dias trab. médio','avgDias',v=>r1(v)],
    ['Atividades / dia','avgAtivDia',v=>r1(v)],
    ['Efetivas / dia','avgEfDia',v=>r1(v)],
    ['Escolas / dia','avgEscDia',v=>r1(v)],
    ['Esc. efetivas / dia','avgEscEfDia',v=>r1(v)],
    ['% Efetividade','pctEf',v=>pct(v)],
    ['% Esc. efetivas','pctEscEf',v=>pct(v)],
  ];
  const th=(cls,t)=>`<th class="${cls}">${t}</th>`;
  let ctHtml=`<tr>${th('','Métrica')}${th('th-a','Analista')}${th('th-e','Estagiário')}</tr>`;
  for(const [label,key,fmt] of metricRows){
    const va=agg_a?fmt(agg_a[key]):'—';
    const ve=agg_e?fmt(agg_e[key]):'—';
    const isAct=key==='count';
    ctHtml+=`<tr${isAct?' class="act-row"':''}><td>${label}</td><td><span class="cv">${va}</span></td><td><span class="cv">${ve}</span></td></tr>`;
  }
  ct.innerHTML=ctHtml;

  // Destaques
  const tops=document.getElementById('tops');
  const sortedAtiv=[...active].sort((a,b)=>b.ativDia-a.ativDia);
  const sortedEf=[...active].sort((a,b)=>b.pctEf-a.pctEf);
  function topCard(m,cat,val,unit,isE){
    if(!m) return '';
    const nm=firstName(m.email);
    return `<div class="top-card${isE?' tc-e':''}"><div class="top-cat">${cat}</div><div class="top-name">${nm}</div><div class="top-val">${val}</div><div class="top-unit">${unit}</div></div>`;
  }
  const topA_atv=sortedAtiv.find(m=>m.cargo==='Analista');
  const topE_atv=sortedAtiv.find(m=>m.cargo==='Estagiário');
  const topA_ef=sortedEf.find(m=>m.cargo==='Analista'&&m.tA>=10);
  const topE_ef=sortedEf.find(m=>m.cargo==='Estagiário'&&m.tA>=10);
  tops.innerHTML=
    topCard(topA_atv,'Mais ativo (Analista)',r1(topA_atv?.ativDia??0),'ativ/dia',false)+
    topCard(topE_atv,'Mais ativo (Estagiário)',r1(topE_atv?.ativDia??0),'ativ/dia',true)+
    topCard(topA_ef,'Maior efetividade (Analista)',pct(topA_ef?.pctEf??0),'efetivas/ativ',false)+
    topCard(topE_ef,'Maior efetividade (Estagiário)',pct(topE_ef?.pctEf??0),'efetivas/ativ',true);

  // Tabela detalhada
  const cols=[
    ['nome','Consultor',null,false],
    ['cargo','Cargo',null,false],
    ['dias','Dias',null,true],
    ['ativDia','Ativ/dia',r1,true],
    ['efDia','Efetivas/dia',r1,true],
    ['escDia','Escolas/dia',r1,true],
    ['escEfDia','Esc.ef/dia',r1,true],
    ['pctEf','% Efetiv.',v=>pct(v),true],
    ['pctEscEf','% Esc.ef.',v=>pct(v),true],
  ];
  const thead=document.getElementById('thead-row');
  thead.innerHTML='<tr>'+cols.map(([k,l])=>{
    const sorted=k===sortCol?' sorted':'';
    const arrow=k===sortCol?(sortAsc?'&#9650;':'&#9660;'):'&#9660;';
    return `<th class="${sorted}" data-col="${k}">${l}<span class="sa">${arrow}</span></th>`;
  }).join('')+'</tr>';
  thead.querySelectorAll('th[data-col]').forEach(th=>th.addEventListener('click',()=>{
    const col=th.dataset.col;
    if(sortCol===col) sortAsc=!sortAsc; else { sortCol=col; sortAsc=false; }
    render();
  }));

  let sorted_rows=[...active];
  sorted_rows.sort((a,b)=>{
    let av=sortCol==='nome'?firstName(a.email):sortCol==='cargo'?a.cargo:a[sortCol]??0;
    let bv=sortCol==='nome'?firstName(b.email):sortCol==='cargo'?b.cargo:b[sortCol]??0;
    if(typeof av==='string') return sortAsc?av.localeCompare(bv):bv.localeCompare(av);
    return sortAsc?av-bv:bv-av;
  });

  const tbody=document.getElementById('tbody');
  if(!sorted_rows.length){
    tbody.innerHTML='<tr><td colspan="9" class="no-data">Nenhum dado no período.</td></tr>';
    return;
  }
  const pillCls=p=>p>=0.5?'pill-ok':p>=0.25?'pill-warn':'pill-bad';
  tbody.innerHTML=sorted_rows.map(m=>{
    const nm=firstName(m.email);
    const bg=m.cargo==='Analista'?'var(--blue-soft)':'var(--purple-soft)';
    const cl=m.cargo==='Analista'?'var(--blue)':'var(--purple)';
    return `<tr>
      <td style="font-weight:600">${nm}</td>
      <td><span style="display:inline-block;background:${bg};color:${cl};padding:2px 8px;border-radius:999px;font-size:11px;font-weight:700">${m.cargo}</span></td>
      <td>${m.dias}</td>
      <td>${r1(m.ativDia)}</td>
      <td>${r1(m.efDia)}</td>
      <td>${r1(m.escDia)}</td>
      <td>${r1(m.escEfDia)}</td>
      <td><span class="pill ${pillCls(m.pctEf)}">${pct(m.pctEf)}</span></td>
      <td><span class="pill ${pillCls(m.pctEscEf)}">${pct(m.pctEscEf)}</span></td>
    </tr>`;
  }).join('');
}

  const cl=document.getElementById('clist');
  cl.innerHTML=RAW_DATA.map(r=>{
    const nm=firstName(r.email);
    const cargo=getCargo(r.email);
    const bg=cargo==='Analista'?'var(--blue-soft)':'var(--purple-soft)';
    const cl_c=cargo==='Analista'?'var(--blue)':'var(--purple)';
    return `<div class="citem" data-email="${r.email}">
      <input type="checkbox" checked data-email="${r.email}">
      <span class="cemail">${nm}</span>
      <span style="display:inline-block;background:${bg};color:${cl_c};padding:1px 6px;border-radius:999px;font-size:10px;font-weight:700">${cargo==='Analista'?'A':'E'}</span>
    </div>`;
  }).join('');
  cl.querySelectorAll('input[type=checkbox]').forEach(cb=>cb.addEventListener('change',()=>{
    if(cb.checked) selectedEmails.add(cb.dataset.email);
    else selectedEmails.delete(cb.dataset.email);
    render();
  }));
  cl.querySelectorAll('.citem').forEach(item=>item.addEventListener('click',e=>{
    if(e.target.tagName==='INPUT') return;
    const cb=item.querySelector('input');
    cb.checked=!cb.checked;
    if(cb.checked) selectedEmails.add(cb.dataset.email);
    else selectedEmails.delete(cb.dataset.email);
    render();
  }));
}

document.getElementById('csearch').addEventListener('input',e=>{
  const q=e.target.value.toLowerCase();
  document.querySelectorAll('.citem').forEach(item=>{
    item.style.display=item.querySelector('.cemail').textContent.toLowerCase().includes(q)?'':'none';
  });
});
document.getElementById('btn-all').addEventListener('click',()=>{
  selectedEmails=new Set(RAW_DATA.map(r=>r.email));
  document.querySelectorAll('.citem input').forEach(cb=>cb.checked=true);
  render();
});
document.getElementById('btn-none').addEventListener('click',()=>{
  selectedEmails.clear();
  document.querySelectorAll('.citem input').forEach(cb=>cb.checked=false);
  render();
});
document.querySelectorAll('.preset-btn').forEach(btn=>btn.addEventListener('click',()=>{
  document.querySelectorAll('.preset-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  windowDays=parseInt(btn.dataset.d);
  document.getElementById('slider').value=windowDays;
  document.getElementById('slider-val').textContent=windowDays;
  render();
}));
document.getElementById('slider').addEventListener('input',e=>{
  windowDays=parseInt(e.target.value);
  document.getElementById('slider-val').textContent=windowDays;
  document.querySelectorAll('.preset-btn').forEach(b=>b.classList.toggle('active',parseInt(b.dataset.d)===windowDays));
  render();
});
document.getElementById('chk-a').addEventListener('change',e=>{ showA=e.target.checked; render(); });
document.getElementById('chk-e').addEventListener('change',e=>{ showE=e.target.checked; render(); });

buildCList();
render();
</script>
</body>
</html>
