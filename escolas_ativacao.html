<style>

  .stamp { background: var(--yellow); color: #2B2200; padding: 5px 13px; border-radius: 6px; font-size: 10px; font-weight: 700; letter-spacing: 1px; }

    font-family: 'Montserrat', sans-serif; font-size: 13px; font-weight: 600;
    padding: 7px 11px; border: 2px solid var(--border); border-radius: 8px;
    background: white; color: var(--gray); cursor: pointer; min-width: 200px;
  }
  .toolbar select:focus { outline: 3px solid var(--purple); border-color: var(--purple); }
  .toolbar .sep { flex: 1; }
  .btn-export {
    display: inline-flex; align-items: center; gap: 7px;
    background: var(--purple); color: white; border: none;
    padding: 8px 18px; border-radius: 8px; font-family: 'Montserrat', sans-serif;
    font-size: 12px; font-weight: 700; cursor: pointer; transition: background 0.15s;
    white-space: nowrap;
  }
  .btn-export:hover { background: var(--purple-dark); }
  .counter { font-size: 10px; color: #bbb; font-style: italic; white-space: nowrap; }
  .table-wrap { background: white; border-radius: 10px; overflow: auto; box-shadow: var(--shadow); }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  thead { background: var(--purple); color: white; position: sticky; top: 0; z-index: 1; }
  th {
    padding: 10px 12px; text-align: left; font-weight: 700; font-size: 9px;
    letter-spacing: 0.8px; text-transform: uppercase; cursor: pointer; user-select: none; white-space: nowrap;
  }
  th:hover { background: var(--purple-dark); }
  th.sortable::after   { content: " ⇅"; opacity: 0.4; font-size: 8px; }
  th.sorted-asc::after  { content: " ▲"; opacity: 1; color: var(--yellow); }
  th.sorted-desc::after { content: " ▼"; opacity: 1; color: var(--yellow); }
  th.num, td.num { text-align: right; }
  td { padding: 8px 12px; border-bottom: 1px solid var(--purple-bg); }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #FAF9FE; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 9px; font-weight: 700; white-space: nowrap; }
  .badge.agendado  { background: var(--green-bg); color: var(--green); }
  .badge.agendar   { background: var(--red-bg); color: var(--red); }
  .badge.noshow    { background: #FFF0E6; color: var(--orange); }
  .noshow-dot { display: inline-block; width: 6px; height: 6px; background: var(--orange); border-radius: 50%; margin-right: 4px; vertical-align: middle; margin-top: -1px; }
  .ax-link { display: inline-flex; align-items: center; margin-left: 5px; color: #ccc; text-decoration: none; vertical-align: middle; transition: color 0.15s; }

  .footer { text-align: center; color: #bbb; font-size: 10px; margin-top: 18px; padding: 14px; font-style: italic; }
  @media (max-width: 768px) { th, td { padding: 6px 7px; font-size: 10px; } }

const state = { etapa: '', ativador: '', sortKey: 'ativador', sortDir: 1 };

// Popula filtro de ativadores (exclui Junior)
const ativadores = [...new Set(
  DATA.filter(function(r) { return r.email && r.email !== 'junior.gomes@estantemagica.com.br'; })
      .map(function(r) { return r.ativador; })
)].sort(function(a, b) { return a.localeCompare(b, 'pt-BR'); });
const selAtv = document.getElementById('filtroAtivador');
ativadores.forEach(function(n) {
  const o = document.createElement('option');
  o.value = n; o.textContent = n;
  selAtv.appendChild(o);
});

function getFiltered() {
  return DATA.filter(function(r) {
    if (r.email === 'junior.gomes@estantemagica.com.br') return false;
    if (state.etapa   && r.etapa   !== state.etapa)   return false;
    if (state.ativador && r.ativador !== state.ativador) return false;
    return true;
  }).sort(function(a, b) {
    const av = a[state.sortKey], bv = b[state.sortKey];
    if (av == null) return 1; if (bv == null) return -1;
    if (typeof av === 'string') return state.sortDir * av.localeCompare(bv, 'pt-BR');
    return state.sortDir * (av - bv);
  });
}

function statusBadge(r) {
  if (r.status === 'Agendado') return '<span class="badge agendado">AGENDADO</span>';
  if (r.status === 'No Show')  return '<span class="badge noshow"><span class="noshow-dot"></span>PARA AGENDAR</span>';
  return '<span class="badge agendar">PARA AGENDAR</span>';
}

function render() {
  const arr   = getFiltered();
  const tbody = document.getElementById('tbody');
  const empty = document.getElementById('empty');
  document.getElementById('counter').textContent = arr.length + ' escola' + (arr.length !== 1 ? 's' : '');

  if (arr.length === 0) { tbody.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';

  tbody.innerHTML = arr.map(function(r) {
    const axLink = r.id_ax ? '<a href="https://axcrm.ai/deals/' + r.id_ax + '" target="_blank" class="ax-link" title="Abrir no AX">' + AX_SVG + '</a>' : '';
    return '<tr>' +
      '<td>' + r.ativador + '</td>' +
      '<td>' + axLink + r.escola + '</td>' +
      '<td>' + r.cidade_uf + '</td>' +
      '<td>' + r.etapa + '</td>' +
      '<td>' + statusBadge(r) + '</td>' +
      '<td class="num">' + (r.bv_data || '—') + '</td>' +
      '<td class="num">' + (r.tentativas || '—') + '</td>' +
      '<td class="num">' + (r.no_shows || '—') + '</td>' +
    '</tr>';
  }).join('');
}

// Ordenação
document.querySelectorAll('#tbl th.sortable').forEach(function(th) {
  th.addEventListener('click', function() {
    const k = th.dataset.key;
    if (state.sortKey === k) state.sortDir *= -1;
    else { state.sortKey = k; state.sortDir = 1; }
    document.querySelectorAll('#tbl th').forEach(function(t) { t.classList.remove('sorted-asc','sorted-desc'); });
    th.classList.add(state.sortDir > 0 ? 'sorted-asc' : 'sorted-desc');
    render();
  });
});

// Filtros
document.getElementById('filtroEtapa').addEventListener('change', function(e) { state.etapa = e.target.value; render(); });
document.getElementById('filtroAtivador').addEventListener('change', function(e) { state.ativador = e.target.value; render(); });

// Exportar CSV
document.getElementById('btnExport').addEventListener('click', function() {
  const arr = getFiltered();
  const cols = ['Ativador','Email','Escola','Cidade/UF','Etapa','Status BV','Data BV','Tentativas','No Shows'];
  const rows = arr.map(function(r) {
    return [r.ativador, r.email, r.escola, r.cidade_uf, r.etapa, r.status, r.bv_data, r.tentativas, r.no_shows]
      .map(function(v) { return '"' + String(v ?? '').replace(/"/g, '""') + '"'; }).join(',');
  });
  const csv  = '﻿' + cols.join(',') + '\n' + rows.join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = 'escolas_ativacao_03_06_2026.csv';
  a.click(); URL.revokeObjectURL(url);
});

render();
</script>
