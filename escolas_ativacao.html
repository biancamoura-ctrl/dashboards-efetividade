const AX_SVG = '<svg width="14" height="12" viewBox="0 0 348 288" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M153 24L223.5 144L139 288H195C197 288 202 286.2 206 279C210 271.8 241 220 256 195L299.5 266.5C302.667 266.672 310.6 265.1 317 257.5C323.4 249.9 331 235 334 228.5C334.667 226.172 335.2 220.3 332 215.5C328.8 210.7 301.667 164.5 288.5 142L346.5 39.5C348.167 34.5 349.5 23 341.5 17C333.5 11 320.833 3.5 315.5 0.5C314.167 -.16 311 -.69 309 2.5C307 5.7 273.167 62.5 256.5 90.5L220 29.5C219 27.67 215.1 24 207.5 24H153Z" fill="#2F7BC7"/><path d="M0 179.5L70.5 24H123.5L186.5 162L153 219.5L145 203.5H71L93.5 152H123L97 96L25 249.5C17.833 247.17 2.8 229.9 0 179.5Z" fill="#CCCCCC"/></svg>';

const state = { etapa: '', ativador: '', sortKey: 'ativador', sortDir: 1 };

// Popula filtro de ativadores (exclui Junior)
const ativadores = [...new Set(
  DATA.filter(function(r) { return r.email && r.email !== 'junior.gomes@estantemagica.com.br'; })
      .map(function(r) { return r.ativador; })
)].sort(function(a, b) { return a.localeCompare(b, 'pt-BR'); });
const selAtv = document.getElementById('filtroAtivador');
ativadores.forEach(function(n) {
  const o = document.createElement('option');
  o.value = n; o.textContent = n;
  selAtv.appendChild(o);
});

function getFiltered() {
  return DATA.filter(function(r) {
    if (r.email === 'junior.gomes@estantemagica.com.br') return false;
    if (state.etapa   && r.etapa   !== state.etapa)   return false;
    if (state.ativador && r.ativador !== state.ativador) return false;
    return true;
  }).sort(function(a, b) {
    const av = a[state.sortKey], bv = b[state.sortKey];
    if (av == null) return 1; if (bv == null) return -1;
    if (typeof av === 'string') return state.sortDir * av.localeCompare(bv, 'pt-BR');
    return state.sortDir * (av - bv);
  });
}

function statusBadge(r) {
  if (r.status === 'Agendado') return '<span class="badge agendado">AGENDADO</span>';
  if (r.status === 'No Show')  return '<span class="badge noshow"><span class="noshow-dot"></span>NO SHOW</span>';
  return '<span class="badge agendar">PARA AGENDAR</span>';
}

function render() {
  const arr   = getFiltered();
  const tbody = document.getElementById('tbody');
  const empty = document.getElementById('empty');
  document.getElementById('counter').textContent = arr.length + ' escola' + (arr.length !== 1 ? 's' : '');

  if (arr.length === 0) { tbody.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';

  tbody.innerHTML = arr.map(function(r) {
    const axLink = r.id_ax ? '<a href="https://axcrm.ai/deals/' + r.id_ax + '" target="_blank" class="ax-link" title="Abrir no AX">' + AX_SVG + ' Ver no AX</a>' : '—';
    return '<tr>' +
      '<td>' + axLink + '</td>' +
      '<td>' + r.ativador + '</td>' +
      '<td>' + r.escola + '</td>' +
      '<td>' + r.etapa + '</td>' +
      '<td>' + (r.segmentacao || '—') + '</td>' +
      '<td>' + (r.baldinho || '—') + '</td>' +
      '<td>' + statusBadge(r) + '</td>' +
      '<td class="num">' + (r.bv_data || '—') + '</td>' +
    '</tr>';
  }).join('');
}

// Ordenação
document.querySelectorAll('#tbl th.sortable').forEach(function(th) {
  th.addEventListener('click', function() {
    const k = th.dataset.key;
    if (state.sortKey === k) state.sortDir *= -1;
    else { state.sortKey = k; state.sortDir = 1; }
    document.querySelectorAll('#tbl th').forEach(function(t) { t.classList.remove('sorted-asc','sorted-desc'); });
    th.classList.add(state.sortDir > 0 ? 'sorted-asc' : 'sorted-desc');
    render();
  });
});

// Filtros
document.getElementById('filtroEtapa').addEventListener('change', function(e) { state.etapa = e.target.value; render(); });
document.getElementById('filtroAtivador').addEventListener('change', function(e) { state.ativador = e.target.value; render(); });

// Exportar CSV
document.getElementById('btnExport').addEventListener('click', function() {
  const arr = getFiltered();
  const cols = ['Ativador','Escola','Etapa','Segmentação','Baldinho','Status BV','Data BV','Link AX'];
  const rows = arr.map(function(r) {
    const link = r.id_ax ? 'https://axcrm.ai/deals/' + r.id_ax : '';
    return [r.ativador, r.escola, r.etapa, r.segmentacao, r.baldinho, r.status, r.bv_data, link]
      .map(function(v) { return '"' + String(v ?? '').replace(/"/g, '""') + '"'; }).join(',');
  });
  const csv  = '﻿' + cols.join(',') + '\n' + rows.join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = 'escolas_ativacao_04_06_2026.csv';
  a.click(); URL.revokeObjectURL(url);
});

render();
</script>
