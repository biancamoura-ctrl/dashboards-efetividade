<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CS Ops — Acesso</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Montserrat',sans-serif;background:#f4f2fb;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#fff;border-radius:16px;padding:40px 36px;width:100%;max-width:360px;box-shadow:0 4px 24px rgba(118,104,172,.15);text-align:center}
.logo{font-size:32px;margin-bottom:8px}
h1{font-size:18px;font-weight:800;color:#1a1a2e;margin-bottom:4px}
.sub{font-size:12px;color:#9ca3af;margin-bottom:28px}
input[type=password]{width:100%;padding:12px 16px;border:2px solid #e5e7eb;border-radius:10px;font-family:inherit;font-size:14px;outline:none;transition:border .2s;margin-bottom:16px}
input[type=password]:focus{border-color:#7668AC}
button{width:100%;padding:12px;background:#7668AC;color:#fff;border:none;border-radius:10px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;transition:opacity .2s}
button:hover{opacity:.88}
.erro{color:#E94B56;font-size:12px;margin-top:10px;display:none}
</style>
</head>
<body>
<div class="card">
  <div class="logo">📊</div>
  <h1>CS Ops Dashboards</h1>
  <p class="sub">Estante Mágica · Acesso restrito</p>
  <input type="password" id="pwd" placeholder="Senha" onkeydown="if(event.key==='Enter')login()">
  <button onclick="login()">Entrar</button>
  <div class="erro" id="erro">Senha incorreta</div>
</div>
<script>
const HASH = '780fcbd9c9f6492c2ce5e5fbce4dcc2de3b4899c40b651933fc8ffece7381609';
async function sha256(msg) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
async function login() {
  const pwd = document.getElementById('pwd').value;
  const h = await sha256(pwd);
  if (h === HASH) {
    sessionStorage.setItem('cs_ops_auth', '1');
    const dest = sessionStorage.getItem('cs_ops_redirect') || 'index.html';
    sessionStorage.removeItem('cs_ops_redirect');
    window.location.replace(dest);
  } else {
    document.getElementById('erro').style.display = 'block';
    document.getElementById('pwd').value = '';
    document.getElementById('pwd').focus();
  }
}
window.onload = () => document.getElementById('pwd').focus();
</script>
</body>
</html>
