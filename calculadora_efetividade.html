<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Proje&#231;&#227;o de Efetividade &#8212; 21/05/2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>

@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f7f5;--surface:#fff;--border:#e8e8e4;--text:#595959;--muted:#9a9a9a;
  --blue:#008ECF;--blue-lt:#e6f4fb;--green:#008ECF;--green-lt:#e6f4fb;
  --amber:#7668AC;--amber-lt:#f0eef8;--red:#E94B56;--red-lt:#fef0f1;
  --yellow:#F9DC45;--purple:#7668AC;
  --radius:10px;--shadow:0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.04)
}
body{font-family:'Montserrat',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
.page{max-width:1280px;margin:0 auto;padding:24px 20px 48px}
.header{margin-bottom:24px;text-align:center}
.header h1{font-size:22px;font-weight:800;letter-spacing:-.3px}
.header p{font-size:13px;color:var(--muted);margin-top:4px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:16px;overflow:hidden;border-top:3px solid var(--yellow)}
.card-head{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.card-title{font-size:14px;font-weight:700}
.card-body{padding:18px}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12.5px;min-width:900px}
thead th{background:#f8f8f6;padding:9px 12px;text-align:left;font-weight:700;font-size:11px;color:var(--muted);border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none}
thead th:hover{background:#f0f0ec}
.sort-icon{opacity:.35;margin-left:4px;font-size:10px}
th.sorted .sort-icon{opacity:1}
tbody tr{border-bottom:1px solid #f0f0ec;transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:#fdfdf9}
tbody td{padding:8px 12px;white-space:nowrap}
td.nome{white-space:normal;min-width:160px;font-weight:600}
td.num{text-align:right;font-variant-numeric:tabular-nums}
.ef-high{color:#008ECF;font-weight:700}.ef-mid{color:#7668AC;font-weight:700}.ef-low{color:#E94B56;font-weight:700}
.qbadge{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap}
.qbadge.q1{background:#e6f4fb;color:#008ECF}.qbadge.q2{background:#fef0f1;color:#E94B56}
.qbadge.q3{background:#f0eef8;color:#7668AC}.qbadge.q4{background:#f3f3f0;color:#595959}
.bar-wrap{display:inline-flex;align-items:center;gap:6px;width:100%}
.bar-bg{flex:1;height:6px;background:#e8e8e4;border-radius:3px;overflow:hidden;min-width:50px}
.bar-fill{height:100%;border-radius:3px}
.chip{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;border:1px solid transparent;cursor:pointer;transition:all .15s;user-select:none}
.chip.active{border-color:currentColor}
.chip.all{background:#f3f3f0;color:#595959}.chip.all.active{background:#e8e8e4}
.chip.q1{background:#e6f4fb;color:#008ECF}.chip.q1.active{background:#c5e8f7}
.chip.q2{background:#fef0f1;color:#E94B56}.chip.q2.active{background:#fdd8db}
.chip.q3{background:#f0eef8;color:#7668AC}.chip.q3.active{background:#dddaf0}
.chip.q4{background:#f3f3f0;color:#595959}.chip.q4.active{background:#e8e8e4}
select,input[type=text]{font-family:'Montserrat',sans-serif;font-size:12px;padding:6px 10px;border-radius:6px;border:1px solid var(--border);background:#fff;color:var(--text);cursor:pointer;outline:none}
select:focus{border-color:var(--yellow)}
.filters{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.filter-group{display:flex;align-items:center;gap:6px}
.summary-bar{font-size:12px;color:var(--muted);padding:10px 16px}
.summary-bar span{font-weight:700;color:var(--text)}
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.kpi{background:var(--surface);border:1px solid var(--border);border-top:3px solid var(--yellow);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow)}
.kpi-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-bottom:6px;font-weight:600}
.kpi-val{font-size:28px;font-weight:800;line-height:1}
.kpi-sub{font-size:12px;color:var(--muted);margin-top:4px}
.kpi.blue .kpi-val{color:#008ECF}.kpi.amber .kpi-val{color:#7668AC}.kpi.green .kpi-val{color:#008ECF}
.legend{display:flex;gap:16px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted)}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.chart-wrap{position:relative;height:380px}
#tooltip{position:fixed;background:#595959;color:#fff;font-size:12px;padding:10px 14px;border-radius:8px;pointer-events:none;display:none;max-width:220px;line-height:1.6;z-index:999}
#tooltip strong{display:block;margin-bottom:4px;font-size:13px}
@media(max-width:700px){.kpi-row{grid-template-columns:repeat(2,1fr)}.chart-wrap{height:300px}}


.controls-bar{background:#fff;border:1px solid var(--border);border-radius:var(--radius);
  padding:16px 20px;margin-bottom:20px;display:flex;flex-wrap:wrap;gap:28px;
  align-items:flex-end;box-shadow:var(--shadow)}
.ctrl-group{display:flex;flex-direction:column;gap:6px;min-width:140px}
.ctrl-label{font-size:10px;font-weight:700;color:var(--muted);
  text-transform:uppercase;letter-spacing:.7px}
.ctrl-val{font-size:22px;font-weight:800;color:#7668AC;line-height:1;margin-bottom:2px}
.ctrl-hint{font-size:10px;color:var(--muted);font-weight:600}
input[type=range]{accent-color:#7668AC;width:160px;cursor:pointer}
input.ritmo-input{font-family:'Montserrat',sans-serif;font-size:24px;font-weight:800;
  color:#7668AC;border:none;border-bottom:2px solid #7668AC;padding:2px 4px;
  width:80px;background:transparent;text-align:center}
input.ritmo-input:focus{outline:none;border-bottom-color:#008ECF;color:#008ECF}
.kpi-pef-blue .kpi-val{color:#008ECF}
.kpi-pef-purple .kpi-val{color:#7668AC}
.kpi-pef-red .kpi-val{color:#E94B56}
.kpi-purple .kpi-val{color:#7668AC}
.proj-box{background:#fff;border:1px solid var(--border);border-radius:var(--radius);
  padding:24px;margin-bottom:20px;box-shadow:var(--shadow);text-align:center}
.proj-status{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;
  letter-spacing:.7px;margin-bottom:8px}
.proj-dias{font-size:52px;font-weight:900;color:#7668AC;line-height:1}
.proj-dias.green{color:#008ECF}
.proj-data{font-size:18px;font-weight:700;color:var(--text);margin-top:6px}
.proj-detalhe{font-size:12px;color:var(--muted);margin-top:10px;
  border-top:1px solid var(--border);padding-top:10px}
.cenario-atual{background:#f0eef8!important;font-weight:700}
.status-ok{color:#008ECF;font-weight:700}
.status-no{color:#E94B56;font-weight:700}

</style>
</head>
<body>
<a href="index.html" style="position:fixed;top:16px;left:16px;display:inline-flex;align-items:center;gap:6px;font-family:'Montserrat',sans-serif;font-size:12px;font-weight:700;color:#fff;background:#7668AC;border:none;border-radius:8px;padding:7px 14px;text-decoration:none;box-shadow:0 2px 6px rgba(118,104,172,.4);z-index:9999;transition:opacity .15s" onmouseover="this.style.opacity='0.85'" onmouseout="this.style.opacity='1'">&#8592; In&#237;cio</a>
<div class="page">
  <div class="header">
    <h1>Proje&#231;&#227;o de Efetividade</h1>
    <p style="color:#9a9a9a;font-size:13px;margin-top:4px">Refer&#234;ncia: 21/05/2026</p>
  </div>

  <div class="controls-bar">
    <div class="ctrl-group">
      <span class="ctrl-label">Meta</span>
      <span class="ctrl-val" id="meta-val">80%</span>
      <input type="range" id="sl-meta" min="60" max="100" value="80" step="1">
    </div>
    <div class="ctrl-group">
      <span class="ctrl-label">Ritmo (escolas efetivadas/dia)</span>
      <input class="ritmo-input" type="number" id="in-ritmo" min="1" max="500" value="1">
      <span class="ctrl-hint">Ritmo de hoje: 212 escolas</span>
    </div>
  </div>

  <div class="kpi-row">
    <div class="kpi">
      <div class="kpi-lbl">Eleg&#237;veis</div>
      <div class="kpi-val" id="kpi-el">&#8212;</div>
    </div>
    <div class="kpi">
      <div class="kpi-lbl">Efetivas Hoje</div>
      <div class="kpi-val" id="kpi-ef">&#8212;</div>
    </div>
    <div class="kpi" id="kpi-pef-card">
      <div class="kpi-lbl">% Atual</div>
      <div class="kpi-val" id="kpi-pef">&#8212;</div>
    </div>
    <div class="kpi">
      <div class="kpi-lbl">Alvo (meta)</div>
      <div class="kpi-val" id="kpi-alvo">&#8212;</div>
    </div>
    <div class="kpi kpi-purple">
      <div class="kpi-lbl">Faltam</div>
      <div class="kpi-val" id="kpi-faltam">&#8212;</div>
    </div>
  </div>

  <div class="proj-box">
    <div class="proj-status">No ritmo informado, chegamos &#224; meta em</div>
    <div class="proj-dias" id="proj-dias">&#8212;</div>
    <div class="proj-data" id="proj-data"></div>
    <div class="proj-detalhe" id="proj-detalhe"></div>
  </div>

  <div class="card">
    <div class="card-head" style="font-weight:700;font-size:13px">Cen&#225;rios de Ritmo</div>
    <div style="overflow-x:auto">
      <table>
        <thead>
          <tr>
            <th>Ritmo</th>
            <th>Ganho/dia</th>
            <th class="num">Prazo</th>
            <th>Data prevista</th>
          </tr>
        </thead>
        <tbody id="cenarios-tbody"></tbody>
      </table>
    </div>
  </div>
</div>
<script>const C = {"efetivas": 1300, "elegiveis": 1889, "pef_atual": 68.8, "ritmo_hoje": 212, "data_ref": "2026-05-21"};

function addDiasUteis(isoDate, n) {
  var d = new Date(isoDate + 'T12:00:00');
  var added = 0;
  while (added < n) {
    d.setDate(d.getDate() + 1);
    var dow = d.getDay();
    if (dow !== 0 && dow !== 6) added++;
  }
  return d;
}
function fmtDate(d) {
  return d.toLocaleDateString('pt-BR', {weekday:'short', day:'2-digit', month:'2-digit'});
}
function render() {
  var meta   = +document.getElementById('sl-meta').value;
  var ritmo  = Math.max(1, +document.getElementById('in-ritmo').value || 1);
  document.getElementById('meta-val').textContent  = meta + '%';
  document.getElementById('ritmo-val').textContent = ritmo;

  var ef  = C.efetivas;
  var el  = C.elegiveis;
  var pef = C.pef_atual;
  var alvo   = Math.ceil(el * meta / 100);
  var faltam = Math.max(0, alvo - ef);
  var ganho  = Math.round((meta - pef) * 10) / 10;

  // KPIs
  document.getElementById('kpi-ef').textContent     = ef;
  document.getElementById('kpi-el').textContent     = el;
  document.getElementById('kpi-pef').textContent    = pef + '%';
  document.getElementById('kpi-alvo').textContent   = alvo;
  document.getElementById('kpi-faltam').textContent = faltam;
  var pcard = document.getElementById('kpi-pef-card');
  pcard.className = 'kpi ' + (pef >= 80 ? 'kpi-pef-blue' : pef >= 70 ? 'kpi-pef-purple' : 'kpi-pef-red');

  // Painel de projeção principal
  var projDias = document.getElementById('proj-dias');
  var projData = document.getElementById('proj-data');
  var projDet  = document.getElementById('proj-detalhe');
  if (faltam <= 0) {
    projDias.textContent = '✅';
    projDias.className   = 'proj-dias green';
    projData.textContent = 'Meta já atingida!';
    projDet.textContent  = ef + ' efetivas ≥ alvo de ' + alvo;
  } else {
    var dias = Math.ceil(faltam / ritmo);
    var dataCheg = addDiasUteis(C.data_ref, dias);
    projDias.textContent = dias + (dias === 1 ? ' dia útil' : ' dias úteis');
    projDias.className   = 'proj-dias';
    projData.textContent = fmtDate(dataCheg);
    projDet.textContent  = 'Faltam ' + faltam + ' escolas ÷ ' + ritmo + '/dia = ' + dias + ' dias úteis';
  }

  // Tabela de cenários
  var tbody = document.getElementById('cenarios-tbody');
  tbody.innerHTML = '';
  var base = ritmo;
  var candidatos = [
    Math.max(1, Math.round(base * 0.5)),
    Math.max(1, Math.round(base * 0.75)),
    base,
    Math.max(1, Math.round(base * 1.25)),
    Math.max(1, Math.round(base * 1.5)),
    Math.max(1, Math.round(base * 2)),
  ];
  var seen = {}; var ritmos = [];
  candidatos.forEach(function(r){ seen[r] = true; });
  Object.keys(seen).forEach(function(k){ ritmos.push(+k); });
  ritmos.sort(function(a,b){ return a-b; });

  ritmos.forEach(function(r) {
    var falt = Math.max(0, alvo - ef);
    var dias = falt <= 0 ? 0 : Math.ceil(falt / r);
    var data = falt <= 0 ? '—' : fmtDate(addDiasUteis(C.data_ref, dias));
    var isAtual = (r === base);
    var ganhoD  = Math.round((r / el) * 100 * 10) / 10;
    var tr = document.createElement('tr');
    if (isAtual) tr.className = 'cenario-atual';
    tr.innerHTML =
      '<td class="num" style="font-weight:700">' + r + ' escolas/dia</td>'
      + '<td class="num" style="color:#9a9a9a;font-size:11px">+' + ganhoD + '%/dia</td>'
      + '<td class="num">' + (falt <= 0 ? '—' : dias + ' dúteis') + '</td>'
      + '<td>' + data + (isAtual ? ' <span style="font-size:10px;color:#7668AC">◄ atual</span>' : '') + '</td>';
    tbody.appendChild(tr);
  });
}
document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('sl-meta').oninput = function(){
    document.getElementById('meta-val').textContent = this.value + '%';
    render();
  };
  document.getElementById('in-ritmo').oninput = render;
  document.getElementById('in-ritmo').value = C.ritmo_hoje;
  render();
});
</script>
</body></html>
